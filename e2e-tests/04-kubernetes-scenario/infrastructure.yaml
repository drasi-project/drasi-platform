apiVersion: v1
kind: ConfigMap
metadata:
  name: devops-data-init
data:
  init.sql: >
    CREATE TABLE IF NOT EXISTS public."RiskyImage"
        (
            "Id" integer NOT NULL,
            "Image" character varying(100) COLLATE pg_catalog."default" NOT NULL,
            "Reason" character varying(100) COLLATE pg_catalog."default",
            CONSTRAINT "RiskyImage_pkey" PRIMARY KEY ("Id")
        );

        insert into "RiskyImage" ("Id", "Image", "Reason") values (1, 'drasi.azurecr.io/my-app:0.1', 'Security Risk');
        insert into "RiskyImage" ("Id", "Image", "Reason") values (2, 'docker.io/library/redis:6.2.3-alpine', 'Compliance Issue');
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: devops-pg-config
  labels:
    app: devops-pg
data:
  POSTGRES_DB: devops
  POSTGRES_USER: test
  POSTGRES_PASSWORD: test
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-pg
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-pg
  template:
    metadata:
      labels:
        app: devops-pg
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          args: ["-c", "wal_level=logical"]
          volumeMounts:
            - name: init
              mountPath: "/docker-entrypoint-initdb.d"
          ports:
            - containerPort: 5432
          envFrom:
            - configMapRef:
                name: devops-pg-config
      volumes:
        - name: init
          configMap:
            name: devops-data-init
---
apiVersion: v1
kind: Service
metadata:
  name: devops-pg
  labels:
    app: devops-pg
spec:
  type: ClusterIP
  ports:
    - port: 5432
  selector:
    app: devops-pg
---
apiVersion: v1
kind: Pod
metadata:
  name: my-app-1
spec:
  containers:
    - name: app
      image: "drasi.azurecr.io/my-app:0.1"
      imagePullPolicy: Always
---
apiVersion: v1
kind: Pod
metadata:
  name: my-app-2
spec:
  containers:
    - name: app
      image: "drasi.azurecr.io/my-app:0.2"
      imagePullPolicy: Always
